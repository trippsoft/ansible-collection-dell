---
name: Run ansible-test sanity tests
'on':
  workflow_call: {}
  workflow_dispatch: {}
  pull_request:
    branches:
      - main
    paths:
      - galaxy.yml
      - plugins/modules/*.ps1
      - plugins/modules/*.py
      - plugins/modules/*.yml
  push:
    branches:
      - main
    paths:
      - galaxy.yml
      - plugins/modules/*.ps1
      - plugins/modules/*.py
      - plugins/modules/*.yml
defaults:
  run:
    working-directory: 'collections/ansible_collections/trippsc2/dell'
jobs:
  sanity:
    name: Run ansible-test sanity tests
    runs-on:
      - self-hosted
      - linux
      - ansible
      - x64
    strategy:
      fail-fast: false
      matrix:
        ansible_version:
          - '2.18'
          - '2.17'
          - '2.16'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: 'collections/ansible_collections/trippsc2/dell'
      - name: Run Molecule tests
        working-directory: 'collections/ansible_collections/trippsc2/dell'
        run: |
          source ~/venv/ansible-test-${{ matrix.ansible_version }}/bin/activate
          ansible-test sanity -v --docker
          deactivate
