---
name: Generate Role Docs
'on':
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - galaxy.yml
      - roles/mdt_drivers/.aar_doc.yml
      - roles/mdt_drivers/README.md
      - roles/mdt_drivers/meta/argument_specs.yml
      - roles/mdt_drivers/meta/main.yml
defaults:
  run:
    working-directory: 'trippsc2.dell'
jobs:
  docs_mdt_drivers:
    name: Generate mdt_drivers role documentation
    permissions:
      contents: write
    runs-on:
      - self-hosted
      - linux
      - ansible
      - x64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: trippsc2.dell
          ref: main
      - name: Generate mdt_drivers role documentation
        working-directory: 'trippsc2.dell'
        run: |
          source ~/venv/ansible-2.16/bin/activate
          cd ./roles/mdt_drivers
          aar-doc . markdown
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"
          git add README.md || /bin/true
          git commit -m "Update mdt_drivers role documentation." || /bin/true
          git push origin main
          deactivate
